<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Traffic Control Agent</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    /* CV Debug Overlay Additions */
    .scene.cv-active .map-image { filter: grayscale(80%) brightness(0.4) contrast(1.2); }
    .scene.cv-active .sensor { background: rgba(239, 68, 68, 0.2) !important; border: 2px solid #ef4444 !important; box-shadow: 0 0 10px rgba(239, 68, 68, 0.5) !important; }
    .scene.cv-active .sensor::after { content: 'ROI ACTIVE'; position: absolute; color: #ef4444; font-size: 10px; font-weight: bold; top: -15px; left: 0; white-space: nowrap; }
    .scene.cv-active .car { outline: 2px solid #22c55e; outline-offset: 2px; }
    .cv-label { display: none; position: absolute; top: -20px; left: -10px; background: #22c55e; color: #000; font-size: 9px; font-weight: 900; font-family: monospace; padding: 2px 4px; white-space: nowrap; z-index: 60; border-radius: 2px; transition: background 0.3s; will-change: background, contents; }
    .scene.cv-active .cv-label { display: block; }
    .btn-cv { background: #8b5cf6; color: white; }
    .btn-cv.active { background: #22c55e; color: black; box-shadow: 0 0 15px rgba(34, 197, 94, 0.5); }
    
    /* Hardware acceleration for smooth car movement */
    .car { will-change: left, top; }
  </style>
</head>
<body>
  <div class="app">
    <h1 class="title">Smart Traffic Control Agent</h1>
    <div class="dashboard-container">
      
      <div class="dashboard-left">
        <div class="scene" id="mainScene" style="margin: 0 !important; transform: scale(0.8); transform-origin: top left;">
          <img src="{{ url_for('static', filename='intersection.jpg') }}" alt="Intersection" class="map-image">

          <div class="signal north-plate"><div class="signal-vertical"><span class="light red" id="northRed"></span><span class="light yellow" id="northYellow"></span><span class="light green" id="northGreen"></span></div></div>
          <div class="signal south-plate"><div class="signal-vertical"><span class="light red" id="southRed"></span><span class="light yellow" id="southYellow"></span><span class="light green" id="southGreen"></span></div></div>
          <div class="signal west-plate"><div class="signal-horizontal"><span class="light red" id="westRed"></span><span class="light yellow" id="westYellow"></span><span class="light green" id="westGreen"></span></div></div>
          <div class="signal east-plate"><div class="signal-horizontal"><span class="light red" id="eastRed"></span><span class="light yellow" id="eastYellow"></span><span class="light green" id="eastGreen"></span></div></div>

          <div class="camera cam-north">📷</div><div class="camera cam-south">📷</div><div class="camera cam-west">📷</div><div class="camera cam-east">📷</div>
          <div class="sensor sensor-north"></div><div class="sensor sensor-south"></div><div class="sensor sensor-west"></div><div class="sensor sensor-east"></div>

          <div class="caution-tape" id="tape1"></div><div class="caution-tape" id="tape2"></div><div class="caution-tape" id="tape3"></div>
          <div id="carsLayer"></div>
        </div>
      </div>

      <div class="dashboard-right">
        <div class="buttons" style="flex-direction: row; gap: 10px;">
            <button id="speedBtn" class="btn btn-speed" onclick="toggleSpeed()">Speed: 1x</button>
            <button id="emergencyBtn" class="btn btn-emergency" onclick="spawnAmbulance()">Ambulance 🚑</button>
            <button id="maintenanceBtn" class="btn btn-maintenance" onclick="triggerMaintenance()">🚧 Close East</button>
        </div>

        <div class="status" id="statusBox">
          <div class="status-grid">
            <div><b>Active Direction:</b> <br/> <span id="ui-direction">...</span></div>
            <div><b>Phase:</b> <br/> <span id="ui-phase">...</span></div>
            <div><b>Remaining Time:</b> <br/> <span id="ui-time">...</span></div>
            <div><b>Active Cars:</b> <br/> <span id="ui-cars">0</span></div>
          </div>
        </div>

        <div class="buttons" style="flex-direction: row; gap: 10px;">
          <button class="btn next" id="autoBtn" onclick="toggleSimulation()">Start Live Traffic</button>
          <button class="btn reset" onclick="resetSimulation()">Clear All</button>
          <button id="cvToggleBtn" class="btn btn-cv" onclick="toggleCVMode()"> Toggle CV</button>
        </div>

        <div class="log" id="logBox">System ready. Waiting to start...</div>
      </div>
    </div>
  </div>

  <script>
    const state = {
      step: {{ data.step }}, active_lane: "{{ data.active_lane }}", 
      active_directions: "{{ data.active_directions }}",
      phase: "{{ data.phase }}", remaining_time: {{ data.remaining_time }}, switching: false
    };

    const carsLayer = document.getElementById("carsLayer");
    const cars = { North: [], South: [], West: [], East: [] };
    const COLORS = ["yellow", "red", "green", "blue"];
    const CAR_LENGTH = 76; const SAFE_GAP = 94; const CAR_SPEED = 2.5; 

    const LANES = {
      North: { dir: "north", axis: "y", x: 303, spawn: -110, stop: 250, exit: 820 },
      South: { dir: "south", axis: "y", x: 375, spawn: 760, stop: 460, exit: -140 },
      West:  { dir: "west",  axis: "x", y: 280, spawn: -120, stop: 265, exit: 820 },
      East:  { dir: "east",  axis: "x", y: 358, spawn: 760, stop: 480, exit: -140 }
    };

    let simInterval = null; let spawnInterval = null; let isAutoRunning = false;
    let simMultiplier = 1; let emergencyMode = false;
    let maintenancePending = false; let maintenanceActive = false; let maintenanceLeaving = false; 
    let truckX = 900; let truckEl = null;

    let isCVMode = false; let vehicleIdCounter = 1000;
    let greenLightSwitchTime = Date.now(); 

    function toggleCVMode() {
        isCVMode = !isCVMode;
        const scene = document.getElementById("mainScene");
        const btn = document.getElementById("cvToggleBtn");
        if (isCVMode) {
            scene.classList.add("cv-active"); btn.classList.add("active");
            document.getElementById("logBox").innerHTML = "<b>[SYSTEM]</b> CV Active. Tracking Wait Times...";
        } else {
            scene.classList.remove("cv-active"); btn.classList.remove("active");
            document.getElementById("logBox").innerHTML = "<b>[SYSTEM]</b> Standard View Restored.";
        }
    }

    function getLaneState(lane) {
      if (emergencyMode && !maintenanceActive) return lane === "North" ? "GREEN" : "RED";
      if (maintenanceActive && lane === "East") return "RED"; 
      if (state.active_lane !== lane) return "RED";
      return state.phase; 
    }

    function toggleSpeed() {
      if (simMultiplier === 1) simMultiplier = 2; else if (simMultiplier === 2) simMultiplier = 3;
      else if (simMultiplier === 3) simMultiplier = 5; else simMultiplier = 1;
      document.getElementById("speedBtn").textContent = `Speed: ${simMultiplier}x`;
      if (isAutoRunning) { clearInterval(simInterval); clearInterval(spawnInterval); startTimers(); }
    }

    // --- EMERGENCY & MAINTENANCE LOGIC ---
    function spawnAmbulance() {
      if(!isAutoRunning) return alert("Please start Live Traffic first!");
      if(emergencyMode) return; 
      document.getElementById("logBox").innerHTML = "<b style='color:red;'>🚨 EMERGENCY OVERRIDE ACTIVE 🚨</b>";
      emergencyMode = true;
      state.active_lane = "North"; state.phase = "GREEN"; state.remaining_time = 15; 
      greenLightSwitchTime = Date.now();
      updateUI();
      makeCar("North", "white", true, false);
    }

    function triggerMaintenance() {
      if(!isAutoRunning) return alert("Please start Live Traffic first!");
      if(maintenanceActive) { initiateExit(); return; }
      maintenancePending = true;
      document.getElementById("maintenanceBtn").disabled = true;
      document.getElementById("logBox").innerHTML = "<b>Alert:</b> Maintenance requested. Flushing East Lane...";
      state.active_lane = "East"; state.phase = "GREEN"; state.remaining_time = 8; 
      greenLightSwitchTime = Date.now();
      updateUI();
    }

    function deployTruck() {
      maintenanceActive = true; maintenancePending = false;
      document.getElementById("maintenanceBtn").disabled = false;
      document.getElementById("maintenanceBtn").textContent = "Open East Lane";
      document.getElementById("maintenanceBtn").className = "btn btn-open";
      truckEl = document.createElement("div"); truckEl.className = "car east truck";
      truckEl.style.left = truckX + "px"; truckEl.style.top = "358px";
      
      vehicleIdCounter++;
      truckEl.innerHTML = `<div class="cv-label" style="transform: rotate(90deg) translate(10px, 40px)">ID:${vehicleIdCounter} 100%</div>` + createCarElementHTML(false, true);
      carsLayer.appendChild(truckEl);
    }

    function initiateExit() {
        maintenanceLeaving = true;
        document.getElementById("maintenanceBtn").disabled = true;
        document.getElementById("logBox").innerHTML = "<b>Status:</b> Waiting for Green Light to clear East Lane...";
        document.getElementById("tape1").classList.remove("show"); document.getElementById("tape2").classList.remove("show"); document.getElementById("tape3").classList.remove("show");
    }

    function openEastLaneFinal() {
        maintenanceActive = false; maintenanceLeaving = false;
        document.getElementById("maintenanceBtn").disabled = false;
        document.getElementById("maintenanceBtn").textContent = "Close East Lane";
        document.getElementById("maintenanceBtn").className = "btn btn-maintenance";
    }

    function animateTruck() {
      if (!truckEl) return;
      
      if (maintenanceActive && !maintenanceLeaving) {
          if (truckX > 510) { 
              truckX -= (3 * simMultiplier); truckEl.style.left = truckX + "px"; 
          } else { 
              document.getElementById("tape1").classList.add("show"); document.getElementById("tape2").classList.add("show"); document.getElementById("tape3").classList.add("show"); 
          }
      } 
      
      if (maintenanceLeaving) {
          const intersectionClear = (state.active_lane === "East" || state.active_lane === "West");
          const hasReactionTimePassed = (Date.now() - greenLightSwitchTime) >= (1500 / simMultiplier);
          const isCenterEmpty = isIntersectionClear("East");

          if (intersectionClear && (state.phase === "GREEN" || state.phase === "YELLOW")) {
              if (hasReactionTimePassed && isCenterEmpty) {
                  truckX -= (4 * simMultiplier); 
                  truckEl.style.left = truckX + "px";
                  if (truckX < -150) { 
                      truckEl.remove(); truckEl = null; truckX = 900; 
                      openEastLaneFinal(); document.getElementById("logBox").innerHTML = "Road back to normal operation."; 
                  }
              }
          }
      }
    }

    function createCarElementHTML(isAmbulance, isTruck) {
      let extras = isAmbulance ? `<div class="ambulance-siren"></div>` : (isTruck ? `<div class="beacon"></div>` : '');
      return `<div class="car-body">${extras}<div class="car-roof"></div><div class="glass front"></div><div class="glass rear"></div><div class="line"></div><div class="light-front left"></div><div class="light-front right"></div><div class="light-back left"></div><div class="light-back right"></div><div class="mirror left"></div><div class="mirror right"></div><div class="bumper front"></div><div class="bumper rear"></div></div>`;
    }

    function makeCar(lane, color, isAmbulance = false, isTruck = false) {
      const cfg = LANES[lane];
      
      // NEW: Added lastScore to track DOM updates and prevent lagging
      const car = { 
        id: `${lane}-${Date.now()}`, trackingId: vehicleIdCounter++, waitTime: 0, lastScore: -1,
        lane, el: document.createElement("div"), speed: isAmbulance ? CAR_SPEED * 2.5 : CAR_SPEED, isAmbulance, x: 0, y: 0 
      };
      
      car.el.className = `car ${cfg.dir} ${color} ${isAmbulance ? 'ambulance' : ''} ${isTruck ? 'truck' : ''}`;
      car.el.innerHTML = `<div class="cv-label">ID:${car.trackingId} 100%</div>` + createCarElementHTML(isAmbulance, isTruck);
      carsLayer.appendChild(car.el);
      
      // NEW: Set label rotation once upon creation instead of 60x a second
      const label = car.el.querySelector('.cv-label');
      if (label) {
          if (car.lane === 'North') label.style.transform = 'rotate(180deg) translate(-25px, -20px)';
          if (car.lane === 'West') label.style.transform = 'rotate(-90deg) translate(-10px, 20px)';
          if (car.lane === 'East') label.style.transform = 'rotate(90deg) translate(10px, 40px)';
      }
      
      if (lane === "North" || lane === "South") { car.x = cfg.x; car.y = cfg.spawn; } else { car.x = cfg.spawn; car.y = cfg.y; }
      updateCarPosition(car); cars[lane].push(car);
    }

    function updateCarPosition(car) { 
      car.el.style.left = `${car.x}px`; car.el.style.top = `${car.y}px`; 
      
      let secondsWaiting = Math.floor(car.waitTime / 60);
      let score = Math.max(0, 100 - secondsWaiting);
      
      // NEW FIX: Only update the HTML text if the score actually changes. Stops the lag!
      if (car.lastScore !== score) {
          car.lastScore = score;
          let color = score > 80 ? "#22c55e" : (score > 50 ? "#f59e0b" : "#ef4444");
          const label = car.el.querySelector('.cv-label');
          if(label) {
              label.style.background = color;
              label.textContent = `ID:${car.trackingId} ${score}%`;
          }
      }
    }
    
    // --- ANTI-COLLISION SYSTEM ---
    function isIntersectionClear(myLane) {
      for (const lane of ["North", "South", "East", "West"]) {
        if (lane === myLane) continue;
        for (const car of cars[lane]) {
          if (car.x > 200 && car.x < 450 && car.y > 200 && car.y < 450) return false; 
        }
      }
      return true;
    }

    function moveLane(lane) {
      const laneCars = cars[lane]; const laneState = getLaneState(lane); const cfg = LANES[lane];
      const isForward = lane === "North" || lane === "West"; const stopLimit = isForward ? cfg.stop - CAR_LENGTH : cfg.stop;
      
      laneCars.sort((a, b) => isForward ? b[cfg.axis] - a[cfg.axis] : a[cfg.axis] - b[cfg.axis]);
      
      laneCars.forEach((car, index) => {
        const pos = car[cfg.axis]; const hasPassed = isForward ? pos > stopLimit : pos < stopLimit;
        let shouldStop = (laneState === "RED" && !hasPassed);
        
        if (laneState === "YELLOW" && !hasPassed && Math.abs(pos - stopLimit) > 80) shouldStop = true;
        
        if (laneState === "GREEN" && !hasPassed && (Date.now() - greenLightSwitchTime) < (1500 / simMultiplier)) {
            shouldStop = true;
        }

        if (!hasPassed && !isIntersectionClear(lane)) {
            shouldStop = true;
        }

        let nextPos = isForward ? pos + (car.speed * simMultiplier) : pos - (car.speed * simMultiplier);
        if (shouldStop) nextPos = isForward ? Math.min(nextPos, stopLimit) : Math.max(nextPos, stopLimit);
        
        if (index > 0) {
            const gapPos = isForward ? laneCars[index - 1][cfg.axis] - SAFE_GAP : laneCars[index - 1][cfg.axis] + SAFE_GAP;
            nextPos = isForward ? Math.min(nextPos, gapPos) : Math.max(nextPos, gapPos);
        }
        
        let isStopped = (pos === nextPos);
        if (isStopped && !hasPassed) car.waitTime += (1 * simMultiplier);
        
        car[cfg.axis] = nextPos; updateCarPosition(car);
      });
    }

    function recycleCars() {
      ["North", "South", "East", "West"].forEach(lane => {
        const laneCars = cars[lane];
        for (let i = laneCars.length - 1; i >= 0; i--) {
          const car = laneCars[i]; const cfg = LANES[lane];
          const out = (lane === "North" && car.y > cfg.exit) || (lane === "South" && car.y < cfg.exit) || (lane === "West" && car.x > cfg.exit) || (lane === "East" && car.x < cfg.exit);
          if (out) { if (car.isAmbulance) { emergencyMode = false; fetchNextStepFromServer(); } car.el.remove(); laneCars.splice(i, 1); }
        }
      });
    }

    function animateCars() {
      if (isAutoRunning) {
        ["North", "South", "East", "West"].forEach(moveLane); recycleCars();
        if (maintenancePending && cars.East.length === 0) deployTruck();
        animateTruck();
      }
      requestAnimationFrame(animateCars);
    }

    // --- TIMERS AND DATA FETCHING ---
    function startTimers() {
      simInterval = setInterval(() => {
        if (emergencyMode || maintenancePending) {
           if (state.remaining_time > 0) state.remaining_time--;
           updateUI(); return; 
        }
        if (state.remaining_time > 0) { state.remaining_time -= 1; updateUI(); } 
        else {
          if (state.phase === "GREEN") { state.phase = "YELLOW"; state.remaining_time = 3; updateUI(); } 
          else { fetchNextStepFromServer(); }
        }
      }, 1000 / simMultiplier); 

      spawnInterval = setInterval(() => {
        ["North", "South", "East", "West"].forEach(lane => {
          if ((maintenancePending || maintenanceActive) && lane === "East") return;
          const spawnChance = getLaneState(lane) === "GREEN" ? 0.40 : 0.15;
          if (Math.random() < spawnChance) {
            const laneCars = cars[lane]; let clearToSpawn = true;
            if (laneCars.length > 0) {
                let lastCar = laneCars.reduce((prev, curr) => (lane === "North" || lane === "West") ? (prev[LANES[lane].axis] < curr[LANES[lane].axis] ? prev : curr) : (prev[LANES[lane].axis] > curr[LANES[lane].axis] ? prev : curr));
                if (Math.abs(lastCar[LANES[lane].axis] - LANES[lane].spawn) < SAFE_GAP + 25) clearToSpawn = false; 
            }
            if (clearToSpawn) makeCar(lane, COLORS[Math.floor(Math.random() * COLORS.length)]);
          }
        });
      }, 800 / simMultiplier);
    }

    function toggleSimulation() {
      const btn = document.getElementById("autoBtn");
      if (isAutoRunning) {
        clearInterval(simInterval); clearInterval(spawnInterval); isAutoRunning = false;
        btn.textContent = "Resume Live Traffic"; btn.style.background = "#22c55e"; 
      } else {
        isAutoRunning = true; btn.textContent = "Pause Traffic"; btn.style.background = "#ef4444"; 
        startTimers();
      }
    }

    function setLaneLights(lane, colorPhase) {
      const red = document.getElementById(`${lane.toLowerCase()}Red`);
      const yellow = document.getElementById(`${lane.toLowerCase()}Yellow`);
      const green = document.getElementById(`${lane.toLowerCase()}Green`);
      red.classList.remove("on"); yellow.classList.remove("on"); green.classList.remove("on");
      if (colorPhase === "GREEN") green.classList.add("on"); else if (colorPhase === "YELLOW") yellow.classList.add("on"); else red.classList.add("on");
    }

    function updateSignals() { ["North", "South", "East", "West"].forEach(lane => setLaneLights(lane, getLaneState(lane))); }

    function updateUI() { 
      document.getElementById("ui-direction").textContent = emergencyMode ? "Emergency North" : (maintenanceActive ? "East Blocked" : state.active_directions);
      document.getElementById("ui-phase").textContent = emergencyMode ? "OVERRIDE" : (maintenanceActive ? "MAINTENANCE" : state.phase);
      document.getElementById("ui-time").textContent = (emergencyMode || maintenancePending) ? "HOLD" : state.remaining_time + 's';
      document.getElementById("ui-cars").textContent = cars.North.length + cars.South.length + cars.East.length + cars.West.length;
      updateSignals(); 
    }

    function applyData(data) {
      if ((state.active_lane !== data.active_lane || state.phase !== data.phase) && data.phase === "GREEN") {
          greenLightSwitchTime = Date.now();
      }
      state.step = data.step; state.active_lane = data.active_lane; state.active_directions = data.active_directions; 
      state.phase = data.phase; state.remaining_time = data.remaining_time; updateUI();
    }

    async function fetchNextStepFromServer() {
      if (state.switching || emergencyMode) return;
      state.switching = true;
      try {
        let waits = {North: 0, South: 0, East: 0, West: 0};
        let counts = {North: cars.North.length, South: cars.South.length, East: cars.East.length, West: cars.West.length};
        
        for(let lane in cars) { cars[lane].forEach(car => { waits[lane] += Math.floor(car.waitTime / 60); }); }
        
        // NEW FIX: Tell the AI the truck is trapped and needs a green light!
        if (maintenanceLeaving) {
            waits.East = 999; counts.East = 1;
        } else if (maintenanceActive || maintenancePending) { 
            waits.East = 0; counts.East = 0; 
        }

        let url = `/next_step?nw=${waits.North}&sw=${waits.South}&ew=${waits.East}&ww=${waits.West}&nc=${counts.North}&sc=${counts.South}&ec=${counts.East}&wc=${counts.West}`;
        let response = await fetch(url); let data = await response.json();
        
        applyData(data);
      } finally { state.switching = false; }
    }

    async function resetSimulation() { location.reload(); }

    updateUI(); requestAnimationFrame(animateCars);
  </script>
</body>
</html>
